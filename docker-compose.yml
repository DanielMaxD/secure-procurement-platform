version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: procurement_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: procurement_user
      POSTGRES_PASSWORD: procurement_password
      POSTGRES_DB: procurement_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: procurement_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:

  postgres_data:

  redis_data: